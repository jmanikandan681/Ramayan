<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ramayan Quiz</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="quiz-container">
<div id="flower-container"></div>
   <div class="header">
    <h1>Ramayan Quiz</h1>
    <div id="scoreDisplay">Score: 0/0</div>
</div>

    <button id="startBtn">Start Quiz</button>

    <!-- Question Box -->
   <div id="question-box" class="hidden">
      <div id="timer">Time: 5</div>
        <h2 id="question"></h2>
        <div id="options"></div>
        <button id="nextBtn">Next</button>
    </div>

    <!-- Result Box -->
<div id="result-box" class="hidden">
    <h2>Quiz Completed</h2>

    <p>Your Score: <strong id="score"></strong></p>
    <p id="message"></p>

    <!-- CTA START -->
    <div class="cta-box">
        <h2 class="cta-heading">🎉 Continue Your Spiritual Journey</h2>

        <p class="cta-text">
            Would you like to attend our <strong>FREE Bhagavad Gita Classes?</strong>
        </p>

        <p class="cta-subtext">
            Limited seats available. Start your spiritual journey today.
        </p>

        <button onclick="redirect()" class="cta-btn">
            👉 Click ME!
        </button>
    </div>
    <!-- CTA END -->

</div>
</div>

</div>

<!-- Audio -->
<audio id="bgMusic" src="bg-music.mp3" loop></audio>
<audio id="correctSound" src="correct.mp3"></audio>
<audio id="wrongSound" src="wrong.mp3"></audio>

<script src="script.js"></script>
</body>
</html>
